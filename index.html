<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FireGuard System</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/4009/4009694.png" type="image/png">
    
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100vh;
            background-color: #0A0F1A; overflow: hidden;
        }
        .iframe-container {
            position: absolute;
            top: -0px; /* ตัดขอบแถบ Google ด้านบนทิ้ง */
            left: 0; width: 100%; height: calc(100vh + 0px);
        }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <div class="iframe-container">
        <iframe id="gas-frame" allowfullscreen></iframe>
    </div>

    <script>
        // 1. ลิงก์ Base URL ตัวหลักของคุณ (ไม่ต้องมี ? ต่อท้าย)
        const baseUrl = "https://script.google.com/macros/s/AKfycbwcg3VBi0CTkOL1ZrNkNsjxXT6UADBkYPQQqRmn9Rlb8IpMXcGpiGV2UMl7_jbDt6CJyw/exec";
        
        // 2. ดึงข้อความทุกอย่างที่อยู่หลังเครื่องหมาย ? จาก URL ของ GitHub
        const urlParams = window.location.search; 
        
        // 3. นำ Base URL มาต่อกับ Parameter แล้วยัดใส่ Iframe
        document.getElementById('gas-frame').src = baseUrl + urlParams;
    </script>

</body>
</html>
